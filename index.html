<script>
const { useState, useMemo, useEffect } = React;

// ── Animated counter: smoothly ticks from old value to new value ─────────────
function useAnimatedNumber(value, duration) {
  duration = duration || 700;
  const [disp, setDisp] = React.useState(value);
  const prev = React.useRef(value);
  React.useEffect(() => {
    const from = prev.current, to = value;
    if (from === to) return;
    prev.current = to;
    const t0 = performance.now();
    function step(now) {
      const p = Math.min((now - t0) / duration, 1);
      const e = p < .5 ? 2*p*p : -1+(4-2*p)*p;
      setDisp(from + (to - from) * e);
      if (p < 1) requestAnimationFrame(step); else setDisp(to);
    }
    requestAnimationFrame(step);
  }, [value]);

    name: "sierra-ropp-dashboard",
    branch: "main",
    path: "index.html"
  };
  const getToken = () => {
    let token = localStorage.getItem("gh_publish_token");
    if (!token) {
      token = window.prompt("Paste your GitHub token (starts with ghp_ or github_pat_).\n\nIt is saved ONLY in this browser and used to update the live site.");
      if (!token) return null;
      token = token.trim();
      localStorage.setItem("gh_publish_token", token);

    return token;

    const bytes = new TextEncoder().encode(str);
    let bin = "";
    for (let i = 0; i < bytes.length; i += 0x8000) bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    return btoa(bin);
  };
  const b64ToUtf8 = b64 => {
    const bin = atob(b64.replace(/\n/g, ""));
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);

    if (r.status === 401 || r.status === 403) {
      localStorage.removeItem("gh_publish_token");
      throw new Error("TOKEN_REJECTED");

// ── Global feed-health banner (John, 2026-07-16): red alert on EVERY tab when a
//    feed goes stale or unreachable. Self-contained 2-min poll of hourly.json
//    (Today tab, 3-min cadence, alert >20m inside 6a–10p) and livefeed.json
//    (90s cadence, alert >10m inside 7a–9p). Two consecutive fetch failures =
//    UNREACHABLE. scorecards.json is excluded on purpose — it only updates when
//    a call finishes, so age is not a health signal. ─────────────────────────
function HealthBanner() {
  const e = React.createElement;
  const [probs, setProbs] = React.useState([]);
  React.useEffect(() => {
    let alive = true;
    const fails = { h: 0, l: 0 };
    const check = () => {
      const now = Date.now();
      const grab = url => fetch(url + "?t=" + now).then(r => r.ok ? r.json() : null).catch(() => null);
      Promise.all([grab("hourly.json"), grab("livefeed.json")]).then(res => {
        if (!alive) return;
        const [hj, lj] = res;
        if (hj) fails.h = 0; else fails.h++;
        if (lj) fails.l = 0; else fails.l++;
        const hAge = hj && hj.generatedMs ? (now - hj.generatedMs) / 60000 : null;
        const lAge = lj && lj.generatedMs ? (now - lj.generatedMs) / 60000 : null;
        let hr = 12;
        try { hr = +new Intl.DateTimeFormat("en-US", { hour: "numeric", hour12: false, timeZone: "America/Los_Angeles" }).format(new Date()); } catch (x) {}
        const p = [];
        if (fails.h >= 2) p.push("TODAY FEED UNREACHABLE");
        else if (hr >= 6 && hr < 22 && hAge !== null && hAge > 20) p.push("TODAY FEED STALE " + Math.round(hAge) + "M");
        if (fails.l >= 2) p.push("LIVE FEED UNREACHABLE");
        else if (hr >= 7 && hr < 21 && lAge !== null && lAge > 10) p.push("LIVE FEED STALE " + Math.round(lAge) + "M");
        setProbs(p);
      });
    };
    check();
    const id = setInterval(check, 120000);
    return () => { alive = false; clearInterval(id); };
  }, []);
  if (!probs.length) return null;
  return e("div", { style: { position: "fixed", top: 0, left: 0, right: 0, zIndex: 9999,
      background: "linear-gradient(90deg,#3a0d12,#5c1219,#3a0d12)", borderBottom: "2px solid #e63946",
      color: "#ff9aa5", fontFamily: "'Chakra Petch',sans-serif", fontWeight: 800, fontSize: 13,
      letterSpacing: ".12em", textAlign: "center", padding: "9px 14px", textTransform: "uppercase",
      animation: "hbGlow 1.4s infinite" } },
    e("style", null, "@keyframes hbGlow{0%,100%{box-shadow:0 4px 18px #e6394633}50%{box-shadow:0 4px 30px #e63946bb}}"),
    "⚠ Dashboard alert · " + probs.join(" · ") + " — numbers on screen may be behind");
}

function Root() {

  const TAB_IDS = ["overview", "livefeed", "hourbyhour", "ytd", "mtd", "weeklyconv", "revenue", "monthly_breakdown", "weekly", "pace", "deptpace", "sameday", "cancel", "allteams", "siloonly", "caclose", "yesterday"];

      if (TAB_IDS.indexOf(saved) >= 0) return saved;
    } catch (x) {}
    return "overview";
  });
  useEffect(() => {
    try {
      localStorage.setItem("silo_tab", tab);
    } catch (x) {}
  }, [tab]);
  const [data, setData] = useState(INITIAL_DATA);
  const [showManage, setShowManage] = useState(false);
  const [hourly, setHourly] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const TV_MODE = new URLSearchParams(window.location.search).has("tv");
  const [kioskMode, setKioskMode] = useState(TV_MODE);
  const [kpiVal, setKpiVal] = useState(60);

  // Live hourly snapshots
  const INTERVAL = 60 * 1000;
  const [deptTgls, setDeptTgls] = useState(null);
  const loadHourly = React.useCallback(() => {
    setRefreshing(true);
    fetch("hourly.json?t=" + Date.now()).then(r => r.ok ? r.json() : null).then(j => {
      if (!j) return;
      // 8 AM reset: if hourly.json is still from a prior day and it's past 8 AM, show a
      // clean zeroed slate (TODAY gauge, revenue, Hour-by-Hour) until today's first report lands.
      const pad = n => String(n).padStart(2, "0");
      const now = new Date();
      const today = now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate());
      if (j.date && j.date !== today && now.getHours() >= 8) {
        const z = JSON.parse(JSON.stringify(j));
        z.date = today;
        z.updated = "awaiting today's first report";
        z.hours = [];
        if (z.today) {
          z.today.calls = 0;
          z.today.tgls = 0;
          z.today.rate = 0;
          z.today.rev = 0;
          if (Array.isArray(z.today.techs)) z.today.techs = [];
          if (z.today.sched) {
            const s = z.today.sched;
            s.ran = 0;
            s.same = 0;
            s.samePct = 0;
            s.sold = 0;
            s.soldrev = 0;
            s.closeRate = 0;
            if (Array.isArray(s.techs)) s.techs = [];
          }
        }
        j = z;
      }
      setHourly(j);
      setLastUpdated(Date.now());
    }).catch(() => {}).finally(() => setRefreshing(false));
  }, []);
  useEffect(() => {
    loadHourly();
    const id = setInterval(loadHourly, INTERVAL);
    return () => clearInterval(id);
  }, []);

  // dept TGLs created today (feeds the KPI boxes + Overview strip source)
  useEffect(() => {
    const loadLf = () => fetch("livefeed.json?t=" + Date.now()).then(r => r.ok ? r.json() : null).then(j => {
      if (j && Array.isArray(j.tgls)) setDeptTgls(j.tgls.length);
    }).catch(() => {});
    loadLf();
    const id = setInterval(loadLf, 60000);
    return () => clearInterval(id);
  }, []);

  // Countdown to next refresh
  useEffect(() => {
    if (!lastUpdated) return;
    const tick = () => {
      const ms = INTERVAL - (Date.now() - lastUpdated);
      if (ms <= 0) {
        setCountdown("now");
        return;
      }
      const m = Math.floor(ms / 60000),
        s = Math.floor(ms % 60000 / 1000);
      setCountdown(m + ":" + String(s).padStart(2, "0"));
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);

        ctx.fillStyle = p.color;
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r);
        ctx.restore();
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.rspd;
        p.vy += 0.07;
      });
      frame++;
      if (frame < 160) requestAnimationFrame(draw);else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        canvas.remove();
      }
    }
    draw();
  };
})();

// ── Auto-refresh every 5 minutes so a wall/monitor display stays current ──
// Skips the reload while the Manage panel is open or a form field is focused,
// so an in-progress edit or rebuild is never lost; it retries a minute later.
(function () {
  var EVERY = 5 * 60 * 1000; // 5 minutes
  function busy() {
    if (window.__modalOpen) return true;
    var el = document.activeElement;
    return !!(el && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName));
  }
  function tick() {
    if (busy()) {
      setTimeout(tick, 60 * 1000);
      return;
    }
    // Plain reload() may be served from the browser's cached copy of this page
    // (GitHub Pages sets Cache-Control: max-age=600) — a full 10-min stale window
    // is possible on the very first auto-refresh after a code deploy. Navigate to
    // a cache-busted URL instead so this reload always fetches the live page.
    var u = new URL(window.location.href);
    u.searchParams.set("_r", Date.now());
    window.location.href = u.toString();
  }
  setTimeout(tick, EVERY);
})();
</script>
